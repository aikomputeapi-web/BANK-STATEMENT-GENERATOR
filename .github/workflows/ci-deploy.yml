name: CI — Build & Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push Docker image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase IMAGE_NAME for GHCR
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          echo "Lowercasing IMAGE_NAME for GHCR"
          IMAGE_LOWER=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=${IMAGE_LOWER}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set image output
        run: echo "IMAGE=$IMAGE_NAME:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for provider configs)
        uses: actions/checkout@v4

      - name: "Deploy: SnapDeploy"
        env:
          SNAPDEPLOY_API_KEY: ${{ secrets.SNAPDEPLOY_API_KEY }}
        run: |
          if [ -z "${SNAPDEPLOY_API_KEY}" ]; then
            echo "SNAPDEPLOY_API_KEY not set; skipping SnapDeploy deploy"
            exit 0
          fi

          echo "Installing SnapDeploy CLI..."
          npm install -g snapdeploy

          echo "Logging in to SnapDeploy..."
          snapdeploy login --token "${SNAPDEPLOY_API_KEY}"

          echo "Deploying application to SnapDeploy..."
          snapdeploy deploy --repo "${GITHUB_REPOSITORY}" --branch "${GITHUB_REF#refs/heads/}" --env production

      - name: Finish
        run: echo "Deployment job finished"
