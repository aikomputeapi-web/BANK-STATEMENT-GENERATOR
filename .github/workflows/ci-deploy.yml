name: CI — Build & Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push Docker image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase IMAGE_NAME for GHCR
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          echo "Lowercasing IMAGE_NAME for GHCR"
          IMAGE_LOWER=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=${IMAGE_LOWER}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set image output
        run: echo "IMAGE=$IMAGE_NAME:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy (via SnapDeploy GitHub Integration)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Notify SnapDeploy
        run: |
          echo "SnapDeploy deployment is triggered via GitHub integration."
          echo "Ensure your SnapDeploy project is connected to this repository."
          echo "Pushes to main branch will trigger automatic deployment."
          echo "Check your SnapDeploy dashboard for deployment status and logs."
